name: Publish to npm

on:
  push:
    tags:
      - "*-keycardai-oauth"
      - "*-keycardai-mcp"
      - "*-keycardai-cloudflare"
      - "*-keycardai-pi-mono"
      - "*-keycardai-sdk"
  workflow_dispatch:
    inputs:
      tag:
        description: "Per-package tag to publish (e.g. 0.4.0-keycardai-mcp). Must already exist on the repo."
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # On workflow_dispatch, check out the specified tag. On tag-push,
          # the default GITHUB_REF already points at the tag so no ref is needed.
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine package from tag
        id: package
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          if [[ "$TAG" == *-keycardai-oauth ]]; then
            echo "name=@keycardai/oauth" >> $GITHUB_OUTPUT
            echo "dir=packages/oauth" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == *-keycardai-mcp ]]; then
            echo "name=@keycardai/mcp" >> $GITHUB_OUTPUT
            echo "dir=packages/mcp" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == *-keycardai-cloudflare ]]; then
            echo "name=@keycardai/cloudflare" >> $GITHUB_OUTPUT
            echo "dir=packages/cloudflare" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == *-keycardai-pi-mono ]]; then
            echo "name=@keycardai/pi-mono" >> $GITHUB_OUTPUT
            echo "dir=packages/pi-mono" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == *-keycardai-sdk ]]; then
            echo "name=@keycardai/sdk" >> $GITHUB_OUTPUT
            echo "dir=packages/sdk" >> $GITHUB_OUTPUT
          fi

      - name: Build all packages
        run: pnpm -r run build

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Publish
        run: pnpm --filter "${{ steps.package.outputs.name }}" publish --access public --no-git-checks --provenance
