name: Publish to npm

on:
  push:
    tags:
      - "*-keycardai-oauth"
      - "*-keycardai-mcp"
      - "*-keycardai-cloudflare"
      - "*-keycardai-pi-mono"
      - "*-keycardai-sdk"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine package from tag
        id: package
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" == *-keycardai-oauth ]]; then
            echo "name=@keycardai/oauth" >> $GITHUB_OUTPUT
            echo "dir=packages/oauth" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == *-keycardai-mcp ]]; then
            echo "name=@keycardai/mcp" >> $GITHUB_OUTPUT
            echo "dir=packages/mcp" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == *-keycardai-cloudflare ]]; then
            echo "name=@keycardai/cloudflare" >> $GITHUB_OUTPUT
            echo "dir=packages/cloudflare" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == *-keycardai-pi-mono ]]; then
            echo "name=@keycardai/pi-mono" >> $GITHUB_OUTPUT
            echo "dir=packages/pi-mono" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == *-keycardai-sdk ]]; then
            echo "name=@keycardai/sdk" >> $GITHUB_OUTPUT
            echo "dir=packages/sdk" >> $GITHUB_OUTPUT
          fi

      - name: Build all packages
        run: pnpm -r run build

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Publish
        run: pnpm --filter "${{ steps.package.outputs.name }}" publish --access public --no-git-checks --provenance
