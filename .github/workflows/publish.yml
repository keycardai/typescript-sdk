name: Publish to npm

on:
  # Fired by `bump-package.yml` after a successful bump. This is the primary
  # path: merge a PR → `main.yml` detects changes → `bump-package.yml` runs
  # `cz bump` → calls this workflow with the resulting tag. No tag-push
  # event crosses a token boundary, so the run is never silently dropped.
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
        description: "Per-package tag to publish (e.g. 0.4.0-keycardai-mcp)"
  # Kept as a convenience for tags pushed from a human's terminal (which,
  # unlike GITHUB_TOKEN pushes, do fire workflow triggers). Not used by the
  # automated bump flow.
  push:
    tags:
      - "*-keycardai-oauth"
      - "*-keycardai-mcp"
      - "*-keycardai-cloudflare"
      - "*-keycardai-pi-mono"
      - "*-keycardai-sdk"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_call → check out the caller-supplied tag.
          # push (tag) → github.ref already points at the tag.
          ref: ${{ inputs.tag || github.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine package from tag
        id: package
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          if [[ "$TAG" == *-keycardai-oauth ]]; then
            echo "name=@keycardai/oauth" >> $GITHUB_OUTPUT
            echo "dir=packages/oauth" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == *-keycardai-mcp ]]; then
            echo "name=@keycardai/mcp" >> $GITHUB_OUTPUT
            echo "dir=packages/mcp" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == *-keycardai-cloudflare ]]; then
            echo "name=@keycardai/cloudflare" >> $GITHUB_OUTPUT
            echo "dir=packages/cloudflare" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == *-keycardai-pi-mono ]]; then
            echo "name=@keycardai/pi-mono" >> $GITHUB_OUTPUT
            echo "dir=packages/pi-mono" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == *-keycardai-sdk ]]; then
            echo "name=@keycardai/sdk" >> $GITHUB_OUTPUT
            echo "dir=packages/sdk" >> $GITHUB_OUTPUT
          fi

      - name: Build all packages
        run: pnpm -r run build

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Publish
        run: pnpm --filter "${{ steps.package.outputs.name }}" publish --access public --no-git-checks --provenance
