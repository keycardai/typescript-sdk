[tool.commitizen]
name = "cz_customize"
version = "0.4.0"
version_files = ["package.json:version"]
tag_format = "${version}-keycardai-mcp"
ignored_tag_formats = ["${version}-*"]
update_changelog_on_bump = true
bump_message = "bump: keycardai-mcp $current_version → $new_version"
major_version_zero = true

[tool.commitizen.customize]
changelog_pattern = "^(feat|fix|refactor|perf|test|build|ci|revert)\\(mcp\\)(!)?:"
